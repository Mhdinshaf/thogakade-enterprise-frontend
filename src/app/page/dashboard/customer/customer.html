<div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Customer Registration</h2>
    <span class="bg-blue-50 text-blue-600 text-xs font-black px-3 py-1 rounded-full uppercase">Thogakade CRM</span>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
    
    <div class="space-y-1">
      <label class="text-xs   font-black text-slate-400 uppercase ml-1">Customer ID</label>
      <input type="text" [(ngModel)]="customerObj.custID" placeholder="C001" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Title</label>
      <select class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition" [(ngModel)]="customerObj.custTitle">
        <option>Mr.</option>
        <option>Mrs.</option>
        <option>Miss.</option>
        <option>Ms.</option>
      </select>
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1"  >Full Name</label>
      <input type="text" [(ngModel)]="customerObj.custName" placeholder="Mohomed Inshaf" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1 md:col-span-2">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Address</label>
      <input type="text" [(ngModel)]="customerObj.custAddress" placeholder="No 123, Main Street" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">City</label>
      <input type="text" [(ngModel)]="customerObj.city" placeholder="Colombo" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Province</label>
      <input type="text" [(ngModel)]="customerObj.province" placeholder="Western" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Postal Code</label>
      <input type="text" [(ngModel)]="customerObj.postalCode" placeholder="10100" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Date of Birth (DOB)</label>
      <input type="date" [(ngModel)]="customerObj.dob" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Salary (LKR)</label>
      <input type="number" [(ngModel)]="customerObj.salary" placeholder="50000.00" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="md:col-span-2 lg:col-span-2 flex items-end gap-3 justify-end pt-4">
      <button class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-8 py-3 rounded-xl shadow-lg shadow-emerald-100 transition duration-300" (click)="addCustomer()">Save Customer</button>
      <button class="bg-amber-500 hover:bg-amber-600 text-white font-bold px-8 py-3 rounded-xl shadow-lg shadow-amber-100 transition duration-300">Update</button>
      <button class="bg-rose-500 hover:bg-rose-600 text-white font-bold px-8 py-3 rounded-xl shadow-lg shadow-rose-100 transition duration-300">Delete</button>
    </div>
  </div>

  <div class="mt-10 overflow-hidden rounded-2xl border border-slate-100">
        <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
    <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
        <tr>
            <th scope="col" class="px-4 py-3">#</th>
            <th scope="col" class="px-4 py-3">ID</th>
            <th scope="col" class="px-4 py-3">Title</th>
            <th scope="col" class="px-4 py-3">Name</th>
            <th scope="col" class="px-4 py-3">Date of Birth</th>
            <th scope="col" class="px-4 py-3">Address</th>
            <th scope="col" class="px-4 py-3">Salary</th> 
            <th scope="col" class="px-4 py-3">Postal Code</th>
            <th scope="col" class="px-4 py-3">
                <span class="sr-only">Actions</span>
            </th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let customer of customerList index as i"class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600">
            <td class="px-4 py-3">{{i+1}}</td>
            <td class="px-4 py-3 font-medium text-gray-900 whitespace-nowrap dark:text-white">{{customer.custID}}</td>
            <td class="px-4 py-3">{{customer.custTitle}}</td>
            <td class="px-4 py-3">{{customer.custName}}</td>
            <td class="px-4 py-3">{{customer.dob}}</td> 
            <td class="px-4 py-3">{{customer.custAddress}}</td>
            <td class="px-4 py-3">{{customer.salary}}</td>
            <td class="px-4 py-3">{{customer.postalCode}}</td>
            
            <td class="px-4 py-3 flex items-center justify-end">
                <button class="font-medium text-blue-600 dark:text-blue-500 hover:underline">Edit</button>
                <button class="font-medium text-red-600 dark:text-red-500 hover:underline ml-3">Delete</button>
            </td>
        </tr>
    </tbody>
</table>
  </div>
</div>
