<div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Customer Registration</h2>
    <span class="bg-blue-50 text-blue-600 text-xs font-black px-3 py-1 rounded-full uppercase">Thogakade CRM</span>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
    
    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Customer ID</label>
      <input type="text" placeholder="C001" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Title</label>
      <select class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
        <option>Mr.</option>
        <option>Mrs.</option>
        <option>Miss.</option>
        <option>Ms.</option>
      </select>
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Full Name</label>
      <input type="text" placeholder="Mohomed Inshaf" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1 md:col-span-2">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Address</label>
      <input type="text" placeholder="No 123, Main Street" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">City</label>
      <input type="text" placeholder="Colombo" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Province</label>
      <input type="text" placeholder="Western" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Postal Code</label>
      <input type="text" placeholder="10100" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Date of Birth (DOB)</label>
      <input type="date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="space-y-1">
      <label class="text-xs font-black text-slate-400 uppercase ml-1">Salary (LKR)</label>
      <input type="number" placeholder="50000.00" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
    </div>

    <div class="md:col-span-2 lg:col-span-2 flex items-end gap-3 justify-end pt-4">
      <button class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-8 py-3 rounded-xl shadow-lg shadow-emerald-100 transition duration-300">Save Customer</button>
      <button class="bg-amber-500 hover:bg-amber-600 text-white font-bold px-8 py-3 rounded-xl shadow-lg shadow-amber-100 transition duration-300">Update</button>
      <button class="bg-rose-500 hover:bg-rose-600 text-white font-bold px-8 py-3 rounded-xl shadow-lg shadow-rose-100 transition duration-300">Delete</button>
    </div>
  </div>

  <div class="mt-10 overflow-hidden rounded-2xl border border-slate-100">
    <table class="w-full text-left">
      <thead class="bg-slate-900 text-white">
        <tr>
          <th class="p-4 text-xs font-black uppercase tracking-widest">ID</th>
          <th class="p-4 text-xs font-black uppercase tracking-widest">Title & Name</th>
          <th class="p-4 text-xs font-black uppercase tracking-widest">Location</th>
          <th class="p-4 text-xs font-black uppercase tracking-widest">Salary</th>
          <th class="p-4 text-xs font-black uppercase tracking-widest text-center">Action</th>
        </tr>
      </thead>
      <tbody class="text-sm text-slate-600 divide-y divide-slate-100">
        <tr class="hover:bg-slate-50 transition">
          <td class="p-4 font-bold">C001</td>
          <td class="p-4">Mr. Kasun Perera</td>
          <td class="p-4">Colombo, Western (10100)</td>
          <td class="p-4 font-bold text-slate-800">125,000.00</td>
          <td class="p-4 text-center">
            <button class="text-blue-600 hover:underline font-bold">Edit</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
