<div class="space-y-6">
  <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Item Inventory</h2>
        <p class="text-slate-500 text-10px font-black uppercase tracking-widest mt-1">Manage Stock & Pricing</p>
      </div>
      <span class="bg-blue-50 text-blue-600 text-10px font-black px-4 py-2 rounded-full uppercase tracking-widest">Thogakade Inventory</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
      
      <div class="space-y-1">
        <label class="text-10px font-black text-slate-400 uppercase ml-1">Item Code</label>
        <input type="text" name="itemCode" [(ngModel)]="itemObj.itemCode" placeholder="P001" 
               class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition">
      </div>

      <div class="space-y-1 md:col-span-2">
        <label class="text-10px font-black text-slate-400 uppercase ml-1">Description</label>
        <input type="text" name="description" [(ngModel)]="itemObj.description" placeholder="Nestomalt 400g Pack" 
               class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition">
      </div>

      <div class="space-y-1">
        <label class="text-10px font-black text-slate-400 uppercase ml-1">Unit Price (LKR)</label>
        <input type="number" name="unitPrice" [(ngModel)]="itemObj.unitPrice" placeholder="0.00" 
               class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition">
      </div>

      <div class="space-y-1">
        <label class="text-10px font-black text-slate-400 uppercase ml-1">Quantity On Hand</label>
        <input type="number" name="qtyOnHand" [(ngModel)]="itemObj.qtyOnHand" placeholder="100" 
               class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition">
      </div>

      <div class="space-y-1">
        <label class="text-10px font-black text-slate-400 uppercase ml-1">Pack Size</label>
        <input type="text" name="packSize" [(ngModel)]="itemObj.packSize" placeholder="400g / 1kg" 
               class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition">
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-6 border-t border-slate-50">
      <button (click)="addItem()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-10 py-3 rounded-2xl shadow-lg shadow-blue-100 transition active:scale-95">
        Save Item
      </button>
      <button class="bg-amber-500 hover:bg-amber-600 text-white font-bold px-8 py-3 rounded-2xl transition">Update</button>
      <button class="bg-rose-500 hover:bg-rose-600 text-white font-bold px-8 py-3 rounded-2xl transition">Delete</button>
    </div>
  </div>

  <div class="bg-white shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-slate-50 border-b border-slate-100">
          <tr>
            <th class="px-6 py-4 text-10px font-black text-slate-400 uppercase tracking-widest">#</th>
            <th class="px-6 py-4 text-10px font-black text-slate-400 uppercase tracking-widest">Item Info</th>
            <th class="px-6 py-4 text-10px font-black text-slate-400 uppercase tracking-widest text-center">Stock</th>
            <th class="px-6 py-4 text-10px font-black text-slate-400 uppercase tracking-widest">Price</th>
            <th class="px-6 py-4 text-10px font-black text-slate-400 uppercase tracking-widest text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50">
          <tr *ngFor="let item of itemList; index as i" class="hover:bg-slate-50/50 transition-colors group">
            <td class="px-6 py-4 text-sm font-bold text-slate-300">{{i + 1}}</td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center font-black text-10px">
                  BOX
                </div>
                <div>
                  <div class="text-sm font-bold text-slate-700">{{item.description}}</div>
                  <div class="text-10px font-black text-blue-500 uppercase">{{item.itemCode}} | {{item.packSize}}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 text-center">
              <span [class]="item.qtyOnHand < 10 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'" 
                    class="px-3 py-1 rounded-lg font-bold text-xs">
                {{item.qtyOnHand}}
              </span>
            </td>
            <td class="px-6 py-4 text-sm font-black text-slate-800">
              Rs. {{item.unitPrice | number:'1.2-2'}}
            </td>
            <td class="px-6 py-4 text-right">
              <button class="text-blue-500 hover:text-blue-700 font-bold text-xs transition-colors">Edit</button>
              <button class="text-rose-500 hover:text-rose-700 font-bold text-xs ml-3 transition-colors">Remove</button>
            </td>
          </tr>
          <tr *ngIf="itemList.length === 0">
            <td colspan="5" class="p-10 text-center text-slate-400 italic font-medium">No items available in the inventory.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
