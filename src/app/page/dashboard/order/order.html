<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border">
    <h3 class="font-bold text-lg mb-4">Place New Order</h3>
    <div class="space-y-4">
      <select class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
        <option>Select Customer</option>
      </select>
      <select class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
        <option>Select Item</option>
      </select>
      <input type="number" placeholder="Qty" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
      <button class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">Add to Cart</button>
    </div>
  </div>

  <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border">
    <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-lg">Cart Items</h3>
        <span class="text-2xl font-bold text-green-600">Total: LKR 0.00</span>
    </div>
    <table class="w-full text-left">
      <thead class="bg-gray-50">
        <tr>
          <th class="p-3">Item</th>
          <th class="p-3">Price</th>
          <th class="p-3">Qty</th>
          <th class="p-3">Total</th>
        </tr>
      </thead>
      <tbody>
        </tbody>
    </table>
    <button class="mt-6 w-full bg-green-600 text-white py-4 rounded-xl font-bold text-xl hover:bg-green-700">
      Confirm Order
    </button>
  </div>
</div>
